interface: lanecove0
port: 5040
private_key_file: /etc/lanecove/peer.key
pre_shared_key: some-psk
verbose: false
keepalive_interval: 25
rekey_after: 180
reconnect_interval: 30
session_expiry: 540

peers:
  - public_key: <relay-public-key-hex>
    endpoint: <relay-host>:5040
    allowed_ips:
      - 10.9.0.0/24
